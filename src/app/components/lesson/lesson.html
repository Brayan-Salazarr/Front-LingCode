<!-- Barra de navegación del módulo -->
<!-- Se pasa un color de fondo como input -->
<app-nav [colorBackground]="'backgroundNav1'"></app-nav>

<!-- Contenedor principal del componente -->
<!-- Solo se muestra si existe una lección actual -->
<div class="component" *ngIf="currentLesson$ | async as lesson">

  <!-- TÍTULO -->
  <h2 class="title-module">{{ lesson.title }}</h2>

  <!-- Progreso de la leccion -->
  <div class="progress-bar">

    <!-- Texto indicador -->
    <p class="text-progress">Progreso</p>

    <!-- Contenedor de la barra -->
    <div class="progress-container">

      <!-- Barra que aumenta según el progreso -->
      <div class="progress" [style.width.%]="moduleProgress$ | async">
      </div>
    </div>
  </div>

  <!-- EJERCICIO ACTUAL -->
  <!-- Obtiene el ejercicio actual de la lección -->
  <ng-container *ngIf="getCurrentExercise(lesson) as currentExercise">

    <h2 class="introduction">
      {{ currentExercise.question }}
    </h2>


    <!-- TIPO MULTIPLE -->
    <!-- Selección de respuesta correcta -->
    <ng-container *ngIf="currentExercise.type === 'multiple'">

      <div class="optionsLess">
        <!-- Se recorren todas las opciones -->
        <div *ngFor="let option of currentExercise.options">
          <button class="buttonOptions" (click)="selectOption(option.text)" [ngClass]="{
              'selected': selectedOption === option.text,
              'correct': isAnswered && option.correct,
              'incorrect': isAnswered && selectedOption === option.text && !option.correct
            }">

            {{ option.text }}

          </button>
        </div>
      </div>

    </ng-container>

    <!-- EJERCICIO TIPO ORDER -->
    <!-- Construir una frase en orden -->
    <ng-container *ngIf="currentExercise.type === 'order'">

      <!-- Palabras seleccionadas por el usuario -->
      <div class="selected-words" [ngClass]="{
          'correct-order': isAnswered && isCorrectAnswer,
          'incorrect-order': isAnswered && !isCorrectAnswer
        }">

        <!-- Permite quitar palabras seleccionadas -->
        <span *ngFor="let word of selectedWords" (click)="removeWord(word)" class="selected-word">

          {{ word }}

        </span>

      </div>

      <!-- Banco de palabras -->
      <div class="word-bank">
        <button *ngFor="let option of currentExercise.options" (click)="addWord(option.text)"
          [disabled]="selectedWords.includes(option.text)" class="buttonOptions">

          {{ option.text }}

        </button>
      </div>

    </ng-container>

    <!-- EJERCICIO TIPO TRANSLATE -->
    <!-- Escribir traducción -->
    <ng-container *ngIf="currentExercise.type === 'translate'">

      <div class="translate-container">

        <input type="text" class="translate-input" [(ngModel)]="selectedOption"
          placeholder="Escribe la traducción..." />

      </div>

    </ng-container>

    <!-- EJERCICIO TIPO FILL -->
    <!-- Completar palabra faltante -->
    <ng-container *ngIf="currentExercise.type === 'fill'">

      <div class="fill-container">

        <input type="text" class="fill-input" [(ngModel)]="selectedOption" placeholder="Completa la palabra..." />

      </div>

    </ng-container>

    <!-- EJERCICIO TIPO MATCH -->
    <!-- Relacionar pares correctos -->
    <ng-container *ngIf="currentExercise.type === 'match'">

      <div class="match-container">

        <!-- Columna izquierda -->
        <div class="match-column">
          <button *ngFor="let pair of currentExercise.pairs" (click)="selectLeft(pair.left)"
            [class.wrong]="wrongPair?.left === pair.left" [class.selected]="selectedLeft === pair.left"
            [disabled]="isLeftDisabled(pair.left)" [class.wrong]="wrongPair?.left === pair.left"
            [class.selected]="selectedLeft === pair.left" class="match-btn">

            {{ pair.left }}

          </button>
        </div>

        <!-- Columna derecha (mezclada aleatoriamente) -->
        <div class="match-column">
          <button *ngFor="let item of shuffledRight" (click)="selectRight(item, lesson)"
            [disabled]="isRightDisabled(item)" [class.wrong]="isWrongRight(item)" class="match-btn">

            {{ item }}

          </button>
        </div>

      </div>

    </ng-container>

    <!-- BOTÓN CONFIRMAR RESPUESTA -->
    <div class="button-field">
      <div id="line"></div>

      <!-- Solo se habilita cuando todos los pares están completados -->
      <button class="confirmation-button" [disabled]="matchedPairs.length !== (currentExercise.pairs?.length || 0)"
        (click)="submitAnswer(lesson)">
        Confirmar
      </button>
    </div>

  </ng-container>

</div>
