<!-- Barra de navegación -->
<app-nav [colorBackground]="(authService.currentUser$ | async) ? 'backgroundNav1' : ''"></app-nav>

<!-- Header -->
<app-header *ngIf="(authService.currentUser$ | async) === null"
  title="Módulos"
  [showTitle]="true"
  [showLine]="true"
  [classSpace]="'space'"
  [showUserInfo]="true"
  [showDecorativeCircle]="true"
  [hideTitleWhenLogged]="true"
  [showHexagon1]="true"
  [showHexagon2]="true"
  [showHexagon3]="true"
  [showHexagon4]="true"
  [showHexagon5]="true"
  [showHexagon6]="true"
  [showHexagon7]="true">
</app-header>

<section class="modulesContainer"
  [class.registered]="(authService.currentUser$ | async) !== null">

  <h1 class="titleModule"
    *ngIf="(authService.currentUser$ | async) !== null">
    Módulos
  </h1>

  <!-- 🔥 CONTROL TOTAL CON ASYNC -->
  <div *ngIf="(modules$ | async) as modules; else loadingTpl">

    <!-- 🔴 SI NO HAY MÓDULOS -->
    <div class="emptyState" *ngIf="modules.length === 0">
      <p>No hay módulos disponibles</p>
    </div>

    <!-- ✅ MÓDULOS REALES -->
    <div class="moduleRow"
      *ngFor="let module of modules; let i = index; let isLast = last; let isFirst = first"
      [class.left]="i % 2 === 0"
      [class.right]="i % 2 !== 0"
      [class.last-module]="isLast"
      [class.first-module]="isFirst">

      <div class="moduleCard">

        <div class="cardBg"
          [style.backgroundImage]="'url(' + module.bgImage + ')'">
        </div>

        <div class="cardContent">

          <img [src]="module.image" [class]="module.size">

          <h3>{{ module.title }}</h3>

          <p class="textProgres">{{ module.text }}</p>

          <div class="progressBar">
            <div class="progress-container">
              <div class="progress"
                [style.width.%]="module.progress">
              </div>
            </div>
          </div>

          <button (click)="goToLessons(module.id)">
            Practicar
          </button>

        </div>
      </div>

      <!-- 🔵 STEPS -->
     <div class="steps"
  [ngClass]="i % 2 === 0 ? 'normal' : 'reverse'">

  <div class="path-horizontal">

     <ng-container *ngFor="let step of getSteps(module.total_lessons); let idx = index; let last = last">

      <!-- 🔥 3 LÍNEAS SOLO ANTES DEL PRIMER CÍRCULO -->
      <ng-container *ngIf="idx === 0">

        <div class="line-step h"
          [class.completed]="module.progress > 0"></div>

        <div class="line-step h"
          [class.completed]="module.progress > 0"></div>

        <div class="line-step h"
          [class.completed]="module.progress > 0"></div>

      </ng-container>

      <!-- 🔵 CÍRCULO -->
      <span class="step"
        (click)="goToLessons(module.id)"
        [class.completed]="module.progress >= ((idx + 1) / module.total_lessons) * 100"
        [class.active]="module.progress >= (idx / module.total_lessons) * 100 
        && module.progress < ((idx + 1) / module.total_lessons) * 100">

        {{ idx + 1 }}

      </span>

      <!-- 🔥 3 LÍNEAS DESPUÉS DE CADA CÍRCULO (menos el último) -->
      <ng-container *ngIf="!last">

        <div class="line-step h"
          [class.completed]="module.progress >= ((idx + 0.33) / module.total_lessons) * 100">
        </div>

        <div class="line-step h"
          [class.completed]="module.progress >= ((idx + 0.66) / module.total_lessons) * 100">
        </div>

        <div class="line-step h"
          [class.completed]="module.progress >= ((idx + 1) / module.total_lessons) * 100">
        </div>

      </ng-container>

    </ng-container>

  </div>
</div>

    </div>

  </div>

  <!-- 🔥 SKELETON -->
  <ng-template #loadingTpl>

    <div class="containerSkeleton">

      <div class="moduleRow"
        *ngFor="let item of [1,2]; let i = index"
        [class.left]="i % 2 === 0"
        [class.right]="i % 2 !== 0">

        <div class="moduleCard skeleton-card">

          <div class="cardBg skeleton-bg"></div>

          <div class="cardContent">
            <div class="skeleton-img"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-bar"></div>
          </div>

        </div>

      </div>

    </div>

  </ng-template>

</section>

<app-footer></app-footer>
