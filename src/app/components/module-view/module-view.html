<!-- Barra de navegación -->
<app-nav [colorBackground]="(authService.currentUser$ | async) ? 'backgroundNav1' : ''"></app-nav>

<!-- Header configurable -->
<!-- Se muestran elementos decorativos y se oculta el título si el usuario está logueado -->
<app-header *ngIf="(authService.currentUser$ | async) === null" title="Módulos" [showTitle]="true" [showLine]="true"
  [classSpace]="'space'" [showUserInfo]="true" [showDecorativeCircle]="true" [hideTitleWhenLogged]="true"
  [showHexagon1]="true" [showHexagon2]="true" [showHexagon3]="true" [showHexagon4]="true" [showHexagon5]="true"
  [showHexagon6]="true" [showHexagon7]="true"></app-header>

<!-- Contenedor principal de módulos -->
<!-- Se renderiza dinámicamente desde el array "modules" -->
<section class="modulesContainer" [class.registered]="(authService.currentUser$ | async) !== null">

  <h1 class="titleModule" *ngIf="(authService.currentUser$ | async) !== null">Módulos</h1>

  <!-- 
    *ngFor recorre los módulos disponibles.
    i: índice actual
    isLast: indica si es el último módulo
    isFirst: indica si es el primero
  -->
  <div class="moduleRow" *ngFor="let module of modules$ | async; let i = index; let isLast = last; let isFirst = first"
    [class.left]="i % 2 === 0" [class.right]="i % 2 !== 0" [class.last-module]="isLast" [class.first-module]="isFirst">

    <!-- Tarjeta -->
    <div class="moduleCard">

      <!-- Fondo visual -->
      <div class="cardBg" [style.backgroundImage]="'url(' + module.bgImage + ')'">
      </div>

      <div class="cardContent">
        <!-- Imagen del módulo (visual front) -->
        <img [src]="module.image" [class]="module.size">

        <!-- Título viene de BD -->
        <h3>{{ module.title }}</h3>

        <!-- Texto visual -->
        <p class="textProgres">{{ module.text }}</p>

        <!-- Barra de progreso (backend si ya existe) -->
        <div class="progressBar">
          <div class="progress-container">
            <div class="progress" [style.width.%]="module.progress">
            </div>
          </div>

        </div>

        <!-- Botón -->
        <button (click)="goToLessons(module.id)">
          Practicar
        </button>
      </div>

    </div>

    <!-- NODOS DE PROGRESO (Steps visuales) -->
    <!-- Cambian orientación según posición (left / right) -->
    <div class="steps" [ngClass]="i % 2 === 0 ? 'normal' : 'reverse'">

      <!-- Camino horizontal -->
      <div class="path-horizontal">
        <div class="line-step h" [class.completed]="currentStep >= 2"></div>
        <div class="line-step h" [class.completed]="currentStep >= 2"></div>
        <div class="line-step h" [class.completed]="currentStep >= 2"></div>

        <span class="step" (click)="goToLessons(module.id)" [class.completed]="module.progress > 0 && currentStep > 1" [class.active]="module.progress > 0 && currentStep === 1">
          1</span>

        <div class="line-step h" [class.completed]="module.progress > 0 && currentStep >= 2"></div>
        <div class="line-step h" [class.completed]="module.progress > 0 && currentStep >= 2"></div>
        <div class="line-step h" [class.completed]="module.progress > 0 && currentStep >= 2"></div>

        <span class="step" (click)="goToLessons(module.id)" [class.completed]="module.progress > 0 && currentStep > 2" [class.active]="module.progress > 0 && currentStep === 2">2</span>
      </div>

      <!-- Camino vertical 
      <div class="path-vertical">
        <div class="line-step v"></div>
        <div class="line-step v"></div>
      </div> -->

    </div>

  </div>
</section>

<!-- Footer general del sitio -->
<app-footer></app-footer>
